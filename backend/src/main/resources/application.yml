server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: simplyft-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/simplyft}
    username: ${SPRING_DATASOURCE_USERNAME:simplyft}
    password: ${SPRING_DATASOURCE_PASSWORD:simplyft}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: always

app:
  ai-service-url: ${AI_SERVICE_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
