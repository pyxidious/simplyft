services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simplyft-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4200}:8080"
    networks:
      - simplyft-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simplyft-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AI_SERVICE_URL: http://ai-service:8000
      WHISPER_SERVICE_URL: http://whisper-service:8001
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      whisper-service:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - simplyft-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: simplyft-ai-service
    environment:
      PORT: 8000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      CONTEXT_DB_HOST: context-db
      CONTEXT_DB_PORT: 5432
      CONTEXT_DB_NAME: ${CONTEXT_POSTGRES_DB}
      CONTEXT_DB_USER: ${CONTEXT_POSTGRES_USER}
      CONTEXT_DB_PASSWORD: ${CONTEXT_POSTGRES_PASSWORD}
      WHISPER_SERVICE_URL: http://whisper-service:8001
    depends_on:
      context-db:
        condition: service_healthy
      ollama:
        condition: service_started
      whisper-service:
        condition: service_healthy
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - simplyft-net

  whisper-service:
    build:
      context: ./whisper-service
      dockerfile: Dockerfile
    container_name: simplyft-whisper-service
    environment:
      PORT: 8001
      HUGGINGFACE_WHISPER_MODEL: ${HUGGINGFACE_WHISPER_MODEL:-openai/whisper-small}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-italian}
      HF_HOME: /models/huggingface
    volumes:
      - whisper-cache:/models/huggingface
    ports:
      - "${WHISPER_SERVICE_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - simplyft-net

  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    container_name: simplyft-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    networks:
      - simplyft-net

  db:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    container_name: simplyft-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - simplyft-net

  context-db:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    container_name: simplyft-context-db
    environment:
      POSTGRES_DB: ${CONTEXT_POSTGRES_DB}
      POSTGRES_USER: ${CONTEXT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CONTEXT_POSTGRES_PASSWORD}
    volumes:
      - context-db-data:/var/lib/postgresql/data
      - ./context-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${CONTEXT_POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CONTEXT_POSTGRES_USER} -d ${CONTEXT_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - simplyft-net

  nginx:
    image: nginx:${NGINX_IMAGE_TAG:-1.27-alpine}
    container_name: simplyft-nginx
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-8080}:80"
    networks:
      - simplyft-net

networks:
  simplyft-net:
    driver: bridge

volumes:
  db-data:
  context-db-data:
  ollama-data:
  whisper-cache:
